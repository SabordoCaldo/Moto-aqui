<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moto Aqui</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="login">

<div class="container">
  <div class="card">

    <!-- LOGO -->
    <div class="logo-box">
      <img src="assets/logo.png">
    </div>

    <p class="sub">App de mobilidade urbana</p>

    <h1>BEM-VINDO</h1>

    <!-- EMAIL -->
    <label>Email ou celular</label>
    <div class="input-box">
      <input type="text" placeholder="Digite seu email ou celular">
    </div>

    <!-- SENHA -->
    <label>Senha</label>
    <div class="input-box">
      <input type="password" id="senha" placeholder="Senha">

      <span class="eye" onclick="toggleSenha('senha', this)">
        <svg viewBox="0 0 24 24">
          <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6-10-6-10-6z"/>
          <path d="M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
        </svg>
      </span>
    </div>

    <!-- OPÇÕES -->
    <div class="opcoes">
      <label><input type="checkbox"> Salvar senha</label>
      <a href="#">Esqueci a senha</a>
    </div>

    <!-- BOTÃO -->
    <button class="btn">Entrar</button>

    <!-- CADASTRO -->
    <div class="cadastro">
      Não tem conta? <b onclick="irCadastro()">Cadastre-se</b>
    </div>

    <!-- OU -->
    <div class="ou">
      <span></span>
      <p>OU</p>
      <span></span>
    </div>

    <!-- GMAIL -->
    <button class="gmail">Entrar com conta Gmail</button>

  </div>
</div>

<script>
function toggleSenha(id, el){
  const input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
    el.classList.add("off");
  }else{
    input.type = "password";
    el.classList.remove("off");
  }
}

function irCadastro(){
  window.location.href = "cadastro/escolha.html";
}
</script>

</body>
</html>
