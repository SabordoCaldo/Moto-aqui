<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moto Aqui</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="container">
  <div class="card">

    <div class="logo-box">
      <img src="assets/logo.png">
    </div>

    <h1>Entrar</h1>

    <div class="input-box">
      <input type="tel" id="telefone" placeholder="Telefone">
    </div>

    <div class="input-box">
      <input type="password" id="senha" placeholder="Senha">

      <span class="eye" onclick="toggleSenha('senha', this)">
        <svg viewBox="0 0 24 24">
          <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6-10-6-10-6z"/>
          <path d="M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
        </svg>
      </span>
    </div>

    <button class="btn" onclick="irCadastro()">Entrar</button>

    <div class="cadastro">
      Não tem conta? <b onclick="irCadastro()">Cadastrar</b>
    </div>

  </div>
</div>

<script>
function toggleSenha(id, el){
  const input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
    el.classList.add("off");
  }else{
    input.type = "password";
    el.classList.remove("off");
  }
}

function irCadastro(){
  window.location.href = "cadastro/escolha.html";
}
</script>

</body>
</html>
