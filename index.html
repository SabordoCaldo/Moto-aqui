<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moto Aqui</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

  <div class="card">

    <!-- LOGO -->
    <div class="logo-box">
      <img src="assets/logo.png">
    </div>

    <!-- TEXTOS -->
    <p class="sub">App de mobilidade urbana</p>
    <h1>BEM-VINDO</h1>

    <!-- FORM -->
    <div class="form">

      <label>Email</label>
      <div class="input-box">
        <input type="text" id="email" placeholder="E-mail">
      </div>

      <label>Senha</label>
      <div class="input-box">
        <input type="password" id="senha" placeholder="Senha">

        <span onclick="toggleSenha('senha')" class="eye">

          <!-- OLHO ABERTO -->
          <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 24 24">
            <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
          </svg>

          <!-- OLHO FECHADO -->
          <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 24 24" style="display:none;">
            <path d="M12 5c-7 0-11 7-11 7a21.8 21.8 0 0 0 5.2 5.9l-2.1 2.1 1.4 1.4 16-16-1.4-1.4-2.5 2.5c-1.6-.8-3.5-1.5-5.6-1.5zm0 12c-1.7 0-3.3-.5-4.6-1.3l1.6-1.6A5 5 0 0 0 12 17c2.8 0 5-2.2 5-5 0-.7-.1-1.3-.4-1.9l1.7-1.7c1.6 1.4 2.7 3.6 2.7 3.6s-4 7-11 7z"/>
          </svg>

        </span>
      </div>

      <div class="opcoes">
        <label><input type="checkbox"> Salvar senha</label>
        <a href="#">Esqueci a senha</a>
      </div>

      <button class="btn" onclick="login()">Entrar</button>

      <p class="cadastro">
        Não tem conta?
        <a href="cadastro/escolha.html"><b>Cadastre-se</b></a>
      </p>

      <div class="ou">
        <span></span>
        <p>OU</p>
        <span></span>
      </div>

      <button class="gmail">
        Entrar com conta Gmail
      </button>

    </div>

  </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
