<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moto Aqui</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body class="login">

<div class="container">
<div class="card">

<div style="text-align:center">
  <img src="assets/logo.png" style="width:200px;">
  <p class="sub">App de mobilidade urbana</p>
</div>

<h1 style="text-align:center;">BEM-VINDO</h1>

<label>Telefone</label>
<div class="input-box">
  <input type="tel" id="telefoneLogin" placeholder="(00) 00000-0000">
</div>
  
<label>Senha</label>
<div class="input-box">
  <input type="password" id="senha" placeholder="Senha">

  <span class="eye" onclick="toggleSenha('senha', this)">
    <svg viewBox="0 0 24 24">
      <path d="M1 12C3.5 7 7.5 4 12 4s8.5 3 11 8c-2.5 5-6.5 8-11 8s-8.5-3-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </span>
</div>

<div class="opcoes">
  <label><input type="checkbox"> Salvar senha</label>
  <a href="#">Esqueci a senha</a>
</div>

<button class="btn">Entrar</button>

<p style="text-align:center;margin-top:15px;">
Não tem conta? <a href="cadastro/escolha.html"><b>Cadastre-se</b></a>
</p>

<div class="ou">
<span></span><p>OU</p><span></span>
</div>

<button class="gmail">Entrar com conta Gmail</button>

</div>
</div>

<!-- 🔥 SCRIPT LIMPO -->
<script>

/* OLHO SENHA */
function toggleSenha(id, el){
  const input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
    el.classList.add("off");
  }else{
    input.type = "password";
    el.classList.remove("off");
  }
}

/* MÁSCARA TELEFONE */
document.getElementById("telefoneLogin").addEventListener("input", function(e){
  let v = e.target.value.replace(/\D/g,"");

  if(v.length > 11) v = v.slice(0,11);

  if(v.length > 6){
    v = v.replace(/^(\d{2})(\d{5})(\d{0,4})$/, "($1) $2-$3");
  } else if(v.length > 2){
    v = v.replace(/^(\d{2})(\d{0,5})$/, "($1) $2");
  } else{
    v = v.replace(/^(\d*)$/, "($1");
  }

  e.target.value = v;
});

</script>

</body>
</html>
