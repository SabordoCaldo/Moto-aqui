<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moto Aqui</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

  <div class="card">

    <!-- LOGO -->
    <div class="logo-box">
      <img src="assets/logo.png">
    </div>

    <!-- TEXTOS -->
    <p class="sub">App de mobilidade urbana</p>
    <h1>BEM-VINDO</h1>

    <!-- FORM -->
    <div class="form">

      <label>Email</label>
      <div class="input-box">
        <input type="text" id="email" placeholder="E-mail">
      </div>

      <label>Senha</label>
      <div class="input-box" style="position:relative;">

        <input type="password" id="senha" placeholder="Senha">

        <span onclick="toggleSenha('senha')" 
        style="
          position:absolute;
          right:15px;
          top:50%;
          transform:translateY(-50%);
          cursor:pointer;
          font-size:18px;
        ">
          👁️
        </span>

      </div>

      <div class="opcoes">
        <label><input type="checkbox"> Salvar senha</label>
        <a href="#">Esqueci a senha</a>
      </div>

      <button class="btn" onclick="login()">Entrar</button>

      <p class="cadastro">
        Não tem conta?
        <a href="cadastro/escolha.html"><b>Cadastre-se</b></a>
      </p>

      <div class="ou">
        <span></span>
        <p>OU</p>
        <span></span>
      </div>

      <!-- GOOGLE -->
      <button class="gmail">
        Entrar com conta Gmail
      </button>

    </div>

  </div>

</div>

<script src="js/auth.js"></script>

<script>
function toggleSenha(id){

  const input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
  }else{
    input.type = "password";
  }

}
</script>

</body>
</html>
