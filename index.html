<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moto Aqui</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

  <div class="card">

    <!-- LOGO -->
    <div class="logo-box">
      <img src="assets/logo.png">
    </div>

    <!-- TEXTOS -->
    <p class="sub">App de mobilidade urbana</p>
    <h1>BEM-VINDO</h1>

    <!-- FORM -->
    <div class="form">

      <label>Email</label>
      <div class="input-box">
        <input type="text" id="email" placeholder="E-mail">
      </div>

      <label>Senha</label>
      <div class="input-box">
        <input type="password" id="senha" placeholder="Senha">
        <span>👁️</span>
      </div>

      <!-- OPÇÕES -->
      <div class="opcoes">
        <label><input type="checkbox"> Salvar senha</label>
        <a href="#">Esqueci a senha</a>
      </div>

      <!-- BOTÃO (CORRIGIDO) -->
      <button class="btn" onclick="login()">Entrar</button>

      <!-- CADASTRO -->
      <p class="cadastro">
        Não tem conta?
        <a href="cadastro/escolha.html"><b>Cadastre-se</b></a>
      </p>

      <div class="ou">
        <span></span>
        <p>OU</p>
        <span></span>
      </div>

      <button class="gmail">
        Entrar com conta Gmail
      </button>

    </div>

  </div>

</div>

<!-- SCRIPT (ESSENCIAL) -->
<script src="js/script.js"></script>

</body>
</html>
