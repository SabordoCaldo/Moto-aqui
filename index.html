<!DOCTYPE html>
<html lang="pt-BR">

<!-- =========================
HEAD
========================= -->
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moto Aqui</title>

<link rel="stylesheet" href="css/style.css">

</head>

<!-- =========================
BODY
========================= -->
<body>

<!-- =========================
CONTAINER
========================= -->
<div class="container">

  <!-- =========================
  CARD
  ========================= -->
  <div class="card">

    <!-- =========================
    LOGO
    ========================= -->
    <div class="logo-box">
      <img src="assets/logo.png">
    </div>

    <!-- =========================
    TEXTOS
    ========================= -->
    <p class="sub">App de mobilidade urbana</p>
    <h1>BEM-VINDO</h1>

    <!-- =========================
    FORMULÁRIO
    ========================= -->
    <div class="form">

      <!-- =========================
      LOGIN
      ========================= -->
      <label>Login</label>
      <div class="input-box">
        <input 
          type="text" 
          id="email" 
          placeholder="Digite seu email ou celular"
        >
      </div>

      <!-- =========================
      SENHA
      ========================= -->
      <label>Senha</label>
      <div class="input-box" style="position:relative;">

        <input 
          type="password" 
          id="senha" 
          placeholder="Senha"
        >

        <!-- =========================
        OLHO SENHA
        ========================= -->
        <span class="eye" onclick="toggleSenha('senha', this)">
  <svg viewBox="0 0 24 24">
    <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6-10-6-10-6z"/>
    <path d="M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
  </svg>
</span>

      <!-- =========================
      OPÇÕES
      ========================= -->
      <div class="opcoes">
        <label><input type="checkbox"> Salvar senha</label>
        <a href="#">Esqueci a senha</a>
      </div>

      <!-- =========================
      BOTÃO ENTRAR
      ========================= -->
      <button class="btn" onclick="login()">Entrar</button>

      <!-- =========================
      CADASTRO
      ========================= -->
      <p class="cadastro">
        Não tem conta?
        <a href="cadastro/escolha.html"><b>Cadastre-se</b></a>
      </p>

      <!-- =========================
      OU
      ========================= -->
      <div class="ou">
        <span></span>
        <p>OU</p>
        <span></span>
      </div>

      <!-- =========================
      GMAIL
      ========================= -->
      <button class="gmail">
        Entrar com conta Gmail
      </button>

    </div>

  </div>

</div>

<!-- =========================
SCRIPTS
========================= -->
<script src="js/auth.js"></script>

<script>

function toggleSenha(id){

  const input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
  }else{
    input.type = "password";
  }

}

</script>

</body>
</html>
