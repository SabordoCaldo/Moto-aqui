<!DOCTYPE html>
<html lang="pt-BR">

<!-- =========================
HEAD
========================= -->
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Motorista</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<!-- =========================
BODY
========================= -->
<body>

<!-- =========================
CONTAINER
========================= -->
<div class="container">

  <!-- =========================
  CARD
  ========================= -->
  <div class="card">

    <!-- =========================
    TÍTULO
    ========================== -->
    <h1>CADASTRO MOTORISTA</h1>

    <!-- =========================
    FOTO PERFIL
    ========================== -->
    <div class="foto-perfil" onclick="escolherFotoPerfil()">
      <img id="fotoPreview" src="../assets/user-motorista.png">
      <div class="add">+</div>
      <input type="file" id="inputFotoPerfil" accept="image/*">
    </div>

    <!-- =========================
    NOME
    ========================== -->
    <label>Nome</label>
    <div class="input-box">
      <input type="text" id="nome" placeholder="Digite seu nome">
    </div>

    <!-- =========================
    TELEFONE
    ========================== -->
    <label>Telefone</label>
    <div class="input-box">
      <input type="tel" id="telefone" placeholder="Digite seu telefone">
    </div>

    <!-- =========================
    ENDEREÇO
    ========================== -->
    <label>Endereço</label>
    <div class="input-box">
      <input type="text" id="endereco" placeholder="Digite seu endereço">
    </div>

    <!-- =========================
    CNH NÚMERO
    ========================== -->
    <label>Número da CNH</label>
    <div class="input-box">
      <input type="text" id="cnh" maxlength="11" inputmode="numeric" placeholder="Digite o número da CNH">
    </div>

    <!-- =========================
    CNH ARQUIVO
    ========================== -->
    <label>CNH (toque para enviar)</label>
    <div class="cnh-box" onclick="escolherCNH()">
      <img id="imgCNH" src="../assets/cnh-exemplo.png">
      <div class="add">+</div>
      <input type="file" id="inputCNH" accept="image/*,.pdf">
    </div>

    <p id="pdfCNH" style="font-size:12px; display:none; text-align:center;"></p>

    <!-- =========================
    SENHA
    ========================== -->
    <label>Senha</label>
    <div class="input-box">
      <input type="password" id="senha" placeholder="Senha (mín. 4 dígitos)">
    </div>

    <!-- =========================
    CONFIRMAR SENHA
    ========================== -->
    <label>Confirmar Senha</label>
    <div class="input-box">
      <input type="password" id="confirmar" placeholder="Confirmar senha">
    </div>

    <!-- =========================
    BOTÃO
    ========================== -->
    <button class="btn" onclick="enviarMotorista()">Enviar para aprovação</button>

    <!-- =========================
    VOLTAR
    ========================== -->
    <p style="text-align:center;">
      <a href="escolha.html">Voltar</a>
    </p>

  </div>
</div>

<!-- =========================
SCRIPTS
========================= -->
<script src="../js/cadastro.js"></script>

<script>

<!-- =========================
FOTO PERFIL
========================= -->
function escolherFotoPerfil(){
  document.getElementById("inputFotoPerfil").click();
}

document.getElementById("inputFotoPerfil").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(event){
      document.getElementById("fotoPreview").src = event.target.result;
    };
    reader.readAsDataURL(file);
  }
});

<!-- =========================
CNH
========================= -->
function escolherCNH(){
  document.getElementById("inputCNH").click();
}

document.getElementById("inputCNH").addEventListener("change", function(e){

  const file = e.target.files[0];
  if(!file) return;

  const img = document.getElementById("imgCNH");
  const pdf = document.getElementById("pdfCNH");

  if(file.type.startsWith("image/")){
    const reader = new FileReader();
    reader.onload = function(event){
      img.src = event.target.result;
      pdf.style.display = "none";
    };
    reader.readAsDataURL(file);
  } 
  else if(file.type === "application/pdf"){
    img.src = "../assets/cnh-exemplo.png";
    pdf.style.display = "block";
    pdf.innerText = "📄 " + file.name;
  }

});

<!-- =========================
TELEFONE
========================= -->
document.getElementById("telefone").addEventListener("input", function(e){

  let v = e.target.value.replace(/\D/g, "");
  if(v.length > 11) v = v.slice(0,11);

  if(v.length > 6){
    v = v.replace(/^(\d{2})(\d{5})(\d{0,4})$/, "($1) $2-$3");
  }else if(v.length > 2){
    v = v.replace(/^(\d{2})(\d{0,5})$/, "($1) $2");
  }else{
    v = v.replace(/^(\d*)$/, "($1");
  }

  e.target.value = v;

});

</script>

</body>
</html>
