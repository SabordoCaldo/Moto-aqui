<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Motorista</title>
<link rel="stylesheet" href="../css/style.css">

<style>
.cnh-box input{ display:none; }
</style>

</head>

<body>

<div class="container">
  <div class="card">

    <h1>CADASTRO MOTORISTA</h1>

    <!-- FOTO -->
    <div class="foto-perfil" onclick="escolherFotoPerfil()">
      <img id="fotoPreview" src="../assets/user-motorista.png">
      <div class="add">+</div>
      <input type="file" id="inputFotoPerfil" accept="image/*">
    </div>

    <!-- CAMPOS -->
    <label>Nome</label>
    <div class="input-box"><input type="text" id="nome"></div>

    <label>Telefone</label>
    <div class="input-box"><input type="tel" id="telefone"></div>

    <label>Endereço</label>
    <div class="input-box"><input type="text" id="endereco"></div>

    <label>Número da CNH</label>
    <div class="input-box"><input type="text" id="cnh" maxlength="11"></div>

    <!-- SENHA -->
    <label>Senha</label>
    <div class="input-box">
      <input type="password" id="senha">
      <span class="eye" onclick="toggleSenha('senha', this)">👁️</span>
    </div>

    <label>Confirmar Senha</label>
    <div class="input-box">
      <input type="password" id="confirmar">
      <span class="eye" onclick="toggleSenha('confirmar', this)">👁️</span>
    </div>

    <!-- CNH -->
    <label>CNH</label>
    <div class="cnh-box" onclick="escolherCNH()">
      <img id="imgCNH" src="../assets/cnh-exemplo.png">
      <div class="add">+</div>
      <input type="file" id="inputCNH">
    </div>

    <p id="pdfCNH"></p>

    <button class="btn" onclick="enviarMotorista()">Enviar para aprovação</button>

  </div>
</div>

<script src="../js/motorista.js"></script>

<script>

// FOTO
function escolherFotoPerfil(){
  document.getElementById("inputFotoPerfil").click();
}

// CNH
function escolherCNH(){
  document.getElementById("inputCNH").click();
}

document.getElementById("inputCNH").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const img = document.getElementById("imgCNH");
  const pdf = document.getElementById("pdfCNH");

  if(file.type.startsWith("image/")){
    const reader = new FileReader();
    reader.onload = function(event){
      img.src = event.target.result;
      img.style.display = "block";
      pdf.style.display = "none";
    };
    reader.readAsDataURL(file);
  }else{
    img.src = "../assets/cnh-exemplo.png";
    pdf.innerText = "📄 " + file.name;
  }
});

// OLHO
function toggleSenha(id, el){
  const input = document.getElementById(id);
  if(input.type === "password"){
    input.type = "text";
    el.innerText = "🙈";
  }else{
    input.type = "password";
    el.innerText = "👁️";
  }
}

</script>

</body>
</html>
