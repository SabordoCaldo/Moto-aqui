<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Motorista</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">
  <div class="card">

    <h1>CADASTRO MOTORISTA</h1>

    <!-- FOTO PERFIL -->
    <div class="foto-perfil">
      <img id="fotoPreview" src="../assets/user-motorista.png">
      <div class="add">+</div>
      <input type="file" id="inputFotoPerfil" accept="image/*">
    </div>

    <!-- CAMPOS -->
    <label>Nome</label>
    <div class="input-box"><input type="text" id="nome"></div>

    <label>Telefone</label>
    <div class="input-box"><input type="tel" id="telefone"></div>

    <label>Endereço</label>
    <div class="input-box"><input type="text" id="endereco"></div>

    <label>Número da CNH</label>
    <div class="input-box"><input type="text" id="cnh" maxlength="11"></div>

    <!-- SENHA -->
    <label>Senha</label>
    <div class="input-box">
      <input type="password" id="senha">
      <span class="eye" onclick="toggleSenha('senha', this)">
        <svg viewBox="0 0 24 24">
          <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6-10-6-10-6z"/>
          <path d="M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
        </svg>
      </span>
    </div>

    <label>Confirmar Senha</label>
    <div class="input-box">
      <input type="password" id="confirmar">
      <span class="eye" onclick="toggleSenha('confirmar', this)">
        <svg viewBox="0 0 24 24">
          <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6-10-6-10-6z"/>
          <path d="M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
        </svg>
      </span>
    </div>

    <!-- CNH (CORRIGIDO) -->
    <label>CNH</label>
    <div class="cnh-box">
      <img id="imgCNH" src="../assets/cnh-exemplo.png">
      <div class="add">+</div>
      <input type="file" id="inputCNH" accept="image/*,.pdf">
    </div>

    <p id="pdfCNH"></p>

    <button class="btn" onclick="enviarMotorista()">Enviar para aprovação</button>

  </div>
</div>

<script src="../js/motorista.js"></script>

<script>

/* =========================
FOTO PERFIL
========================= */
document.getElementById("inputFotoPerfil").addEventListener("change", function(e){

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){
    document.getElementById("fotoPreview").src = event.target.result;
  };

  reader.readAsDataURL(file);
});

/* =========================
CNH (FIX REAL)
========================= */
const inputCNH = document.getElementById("inputCNH");

inputCNH.addEventListener("change", function(e){

  const file = e.target.files[0];
  if(!file) return;

  const img = document.getElementById("imgCNH");
  const pdf = document.getElementById("pdfCNH");

  pdf.style.display = "none";
  pdf.innerText = "";

  if(file.type.startsWith("image/")){

    const reader = new FileReader();

    reader.onload = function(event){
      img.src = event.target.result;
      img.style.display = "block";
    };

    reader.readAsDataURL(file);

  } 
  else if(file.type === "application/pdf"){

    img.style.display = "none";

    pdf.style.display = "block";
    pdf.innerText = "📄 " + file.name;

  }

});

/* =========================
OLHO SENHA
========================= */
function toggleSenha(id, el){
  const input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
    el.classList.add("off");
  }else{
    input.type = "password";
    el.classList.remove("off");
  }
}

/* =========================
TELEFONE
========================= */
document.getElementById("telefone").addEventListener("input", function(e){

  let v = e.target.value.replace(/\D/g, "");

  if(v.length > 11) v = v.slice(0,11);

  if(v.length > 6){
    v = v.replace(/^(\d{2})(\d{5})(\d{0,4})$/, "($1) $2-$3");
  }else if(v.length > 2){
    v = v.replace(/^(\d{2})(\d{0,5})$/, "($1) $2");
  }else{
    v = v.replace(/^(\d*)$/, "($1");
  }

  e.target.value = v;

});

</script>

</body>
</html>
