<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Motorista</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/cadastro.css">

</head>

<body>

<div class="container">
  <div class="card">

    <h1>Cadastro Motorista</h1>

    <div class="foto-perfil">
      <img id="fotoPreview" src="../assets/user-motorista.png">
      <div class="add">+</div>
      <input type="file" id="inputFotoPerfil">
    </div>

    <label>Nome</label>
    <div class="input-box"><input type="text"></div>

    <label>Telefone</label>
    <div class="input-box"><input type="tel"></div>

    <label>CNH</label>
    <div class="input-box"><input type="text"></div>

    <!-- MOTO -->
    <label>Placa</label>
    <div class="input-box"><input type="text"></div>

    <label>Ano</label>
    <div class="input-box"><input type="number"></div>

    <label>Cor</label>
    <div class="input-box"><input type="text"></div>

    <label>Modelo</label>
    <div class="input-box"><input type="text"></div>

    <!-- CNH IMG -->
    <div class="cnh-box">
      <img id="imgCNH" src="../assets/cnh-exemplo.png">
      <div class="add">+</div>
      <input type="file">
    </div>

    <!-- CRLV -->
    <div class="cnh-box">
      <img src="../assets/cnh-exemplo.png">
      <div class="add">+</div>
      <input type="file">
    </div>

    <button class="btn">Enviar</button>

  </div>
</div>

</body>
</html>
