<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motorista</title>

<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="container">
<div class="card">

<h1>CADASTRO MOTORISTA</h1>

<!-- FOTO -->
<div class="foto-perfil">
<img id="fotoPreview" src="../assets/user-motorista.png">
<div class="add">+</div>
<input type="file" id="fotoInput" accept="image/*">
</div>

<label>Nome</label>
<div class="input-box">
<input type="text">
</div>

<label>Telefone</label>
<div class="input-box">
<input type="tel" id="telefone">
</div>

<label>Endereço</label>
<div class="input-box">
<input type="text">
</div>

<label>Número da CNH</label>
<div class="input-box">
<input type="text">
</div>

<label>Senha</label>
<div class="input-box">
<input type="password" id="senha">

<span class="eye" onclick="toggleSenha('senha', this)">
<svg viewBox="0 0 24 24">
<path d="M1 12C3.5 7 7.5 4 12 4s8.5 3 11 8c-2.5 5-6.5 8-11 8s-8.5-3-11-8z"/>
<circle cx="12" cy="12" r="3"/>
</svg>
</span>
</div>

<label>Confirmar Senha</label>
<div class="input-box">
<input type="password" id="confirmar">

<span class="eye" onclick="toggleSenha('confirmar', this)">
<svg viewBox="0 0 24 24">
<path d="M1 12C3.5 7 7.5 4 12 4s8.5 3 11 8c-2.5 5-6.5 8-11 8s-8.5-3-11-8z"/>
<circle cx="12" cy="12" r="3"/>
</svg>
</span>
</div>

<!-- MOTO -->
<label>Placa</label>
<div class="input-box"><input type="text" placeholder="ABC1D23"></div>

<label>Ano</label>
<div class="input-box"><input type="number" placeholder="2020"></div>

<label>Cor</label>
<div class="input-box"><input type="text" placeholder="Preta"></div>

<label>Modelo</label>
<div class="input-box"><input type="text" placeholder="Factor 150"></div>

<!-- CNH -->
<label>CNH</label>
<div class="cnh-box">
<img id="previewCNH" src="../assets/cnh-exemplo.png">
<div class="add">+</div>
<input type="file" id="inputCNH" accept="image/*,application/pdf">
</div>
<p id="pdfCNH"></p>

<!-- CRLV -->
<label>CRLV</label>
<div class="cnh-box">
<img id="previewCRLV" src="../assets/crlv.png">
<div class="add">+</div>
<input type="file" id="inputCRLV" accept="image/*,application/pdf">
</div>
<p id="pdfCRLV"></p>

<button class="btn" onclick="alert('Cadastro enviado!')">
Enviar para aprovação
</button>

<p style="text-align:center;">
<a href="escolha.html">Voltar</a>
</p>

</div>
</div>

<script>
// FOTO
document.getElementById("fotoInput").addEventListener("change", e=>{
const file = e.target.files[0];
if(file){
const r = new FileReader();
r.onload = ev => document.getElementById("fotoPreview").src = ev.target.result;
r.readAsDataURL(file);
}
});

// CNH
document.getElementById("inputCNH").addEventListener("change", e=>{
const file = e.target.files[0];
if(!file) return;

if(file.type === "application/pdf"){
document.getElementById("pdfCNH").innerText = file.name;
}else{
const r = new FileReader();
r.onload = ev => document.getElementById("previewCNH").src = ev.target.result;
r.readAsDataURL(file);
}
});

// CRLV
document.getElementById("inputCRLV").addEventListener("change", e=>{
const file = e.target.files[0];
if(!file) return;

if(file.type === "application/pdf"){
document.getElementById("pdfCRLV").innerText = file.name;
}else{
const r = new FileReader();
r.onload = ev => document.getElementById("previewCRLV").src = ev.target.result;
r.readAsDataURL(file);
}
});

// OLHO
function toggleSenha(id, el){
const input = document.getElementById(id);

if(input.type === "password"){
input.type = "text";
el.classList.add("off");
}else{
input.type = "password";
el.classList.remove("off");
}
}

// TELEFONE
document.getElementById("telefone").addEventListener("input", function(e){
let v = e.target.value.replace(/\D/g,"");
if(v.length>11) v=v.slice(0,11);

if(v.length>6){
v=v.replace(/^(\d{2})(\d{5})(\d{0,4})$/,"($1) $2-$3");
}else if(v.length>2){
v=v.replace(/^(\d{2})(\d{0,5})$/,"($1) $2");
}else{
v=v.replace(/^(\d*)$/,"($1");
}
e.target.value=v;
});
</script>

</body>
</html>
