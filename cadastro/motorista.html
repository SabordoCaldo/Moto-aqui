<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Motorista</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">

  <div class="card">

    <!-- LOGO -->
    <div class="logo-box">
      <img src="../assets/logo.png">
    </div>

    <!-- TEXTO -->
    <p class="sub">App de mobilidade urbana</p>
    <h1>CADASTRO MOTORISTA</h1>

    <!-- FORM -->
    <div class="form">

      <!-- NOME -->
      <label>Nome</label>
      <div class="input-box">
        <input type="text" placeholder="Seu nome">
      </div>

      <!-- EMAIL -->
      <label>Email</label>
      <div class="input-box">
        <input type="email" placeholder="Seu e-mail">
      </div>

      <!-- SENHA -->
      <label>Senha</label>
      <div class="input-box">
        <input type="password" placeholder="Senha">
      </div>

      <!-- CNH -->
      <label>CNH</label>
      <div class="input-box">
        <input type="text" placeholder="Número da CNH">
      </div>

      <!-- PLACA -->
      <label>Placa do Veículo</label>
      <div class="input-box">
        <input type="text" placeholder="ABC-1234">
      </div>

      <!-- VEÍCULO -->
      <label>Modelo do Veículo</label>
      <div class="input-box">
        <input type="text" placeholder="Ex: Honda CG 160">
      </div>

      <!-- BOTÃO -->
      <button class="btn">Cadastrar</button>

      <!-- VOLTAR -->
      <p class="cadastro">
        <a href="escolha.html">Voltar</a>
      </p>

    </div>

  </div>

</div>

</body>
</html>
