<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/style.css">

<title>Escolha</title>

</head>

<body>

<div class="container">
  <div class="card">

    <!-- LOGO -->
    <div style="text-align:center;">
      <img src="../assets/logo.png" style="width:180px;">
    </div>

    <!-- TEXTO -->
    <p style="text-align:center;color:#f1c40f;">App de mobilidade urbana</p>
    <h1 style="text-align:center;">Escolha o Tipo</h1>

    <!-- BOTÕES -->
    <button class="btn" onclick="selecionarTipo('cliente')" id="btnCliente">
      Sou Cliente
    </button>

    <button class="btn" onclick="selecionarTipo('motorista')" id="btnMotorista">
      Sou Motorista
    </button>

    <!-- CIDADE -->
    <label>Cidade</label>
    <select id="cidade" class="input-box">
      <option value="">Selecione sua cidade</option>
      <option>Alpinópolis</option>
      <option>Bom Jesus da Penha</option>
      <option>Itaú de Minas</option>
      <option>Passos</option>
      <option>São João Batista do Glória</option>
    </select>

    <!-- TERMOS -->
    <h3>Termos e Privacidade</h3>

    <div id="boxTermos" style="
      height:150px;
      overflow-y:scroll;
      background:#f5f5f5;
      padding:10px;
      border-radius:10px;
      font-size:13px;
      margin-bottom:10px;
    "></div>

    <label id="labelTermos" style="opacity:0.5;">
      <input type="checkbox" id="termos" disabled>
      Estou ciente e aceito os termos
    </label>

    <!-- BOTÃO -->
    <button class="btn" id="btnContinuar" onclick="continuar()" disabled>
      Continuar
    </button>

    <p style="text-align:center;">
      <a href="../index.html">Voltar</a>
    </p>

  </div>
</div>

<script src="../termos/termos.js"></script>
<script src="../js/escolha.js"></script>

<script>

let tipoSelecionado = null;

const box = document.getElementById("boxTermos");
const checkbox = document.getElementById("termos");
const label = document.getElementById("labelTermos");
const botao = document.getElementById("btnContinuar");

// CARREGA TERMOS
box.innerHTML = termosApp.texto;

// LIBERA CHECKBOX NO FINAL
box.addEventListener("scroll", function(){

  const chegouFinal = box.scrollTop + box.clientHeight >= box.scrollHeight - 2;

  if(chegouFinal){
    checkbox.disabled = false;
    label.style.opacity = "1";
  }

});

// SELEÇÃO BOTÃO
function selecionarTipo(tipo){

  tipoSelecionado = tipo;

  document.getElementById("btnCliente").style.opacity = tipo === "cliente" ? "1" : "0.5";
  document.getElementById("btnMotorista").style.opacity = tipo === "motorista" ? "1" : "0.5";

  verificar();
}

// VERIFICA LIBERAÇÃO
function verificar(){

  const cidade = document.getElementById("cidade").value;
  const termos = checkbox.checked;

  if(tipoSelecionado && cidade && termos){
    botao.disabled = false;
    botao.style.opacity = "1";
  }else{
    botao.disabled = true;
    botao.style.opacity = "0.5";
  }

}

// EVENTOS
document.getElementById("cidade").addEventListener("change", verificar);
checkbox.addEventListener("change", verificar);

</script>

</body>
</html>
