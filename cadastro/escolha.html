<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="container">
<div class="card">

<!-- LOGO -->
<div style="text-align:center">
  <img src="../assets/logo.png" style="width:200px;">
  <p class="sub" style="color:#FFD600; font-size:20px;">
    App de mobilidade urbana
  </p>
</div>

<!-- TÍTULO -->
<h1 style="text-align:center;">CADASTRO</h1>

<!-- BOTÕES -->
<button class="btn" style="font-size:19px;" onclick="selecionarTipo('cliente')">
  Sou Cliente
</button>

<button class="btn" style="font-size:19px;" onclick="selecionarTipo('motorista')">
  Sou Motorista
</button>

<!-- CIDADE -->
<label>Cidade</label>

<div class="input-box">
  <input type="text" id="cidadeBusca" placeholder="Digite sua cidade">
</div>

<select id="cidadeSelect" style="width:100%; padding:12px; border-radius:10px; margin-bottom:15px;">
  <option value="">Selecione a cidade</option>
</select>

<!-- TERMOS -->
<label>Termos e Privacidade</label>

<textarea id="termosBox"
style="width:100%; height:120px; border-radius:10px; padding:10px;"
readonly></textarea>

<!-- ACEITE -->
<label style="display:block; margin-top:15px; font-weight:bold;">
  <input type="checkbox" id="aceite">
  ESTOU CIENTE E ACEITO OS TERMOS
</label>

<!-- BOTÃO -->
<button class="btn" id="continuar"
disabled style="margin-top:20px; opacity:0.5;">
Continuar
</button>

<p style="text-align:center;margin-top:10px;">
<a href="../index.html">Voltar</a>
</p>

</div>
</div>

<!-- =========================
SCRIPTS
========================= -->

<!-- TERMOS -->
<script src="../termos/termos.js"></script>

<!-- CIDADES -->
<script src="../cidades/passos.js"></script>
<script src="../cidades/alpinopolis.js"></script>
<script src="../cidades/bom-jesus.js"></script>
<script src="../cidades/gloria.js"></script>
<script src="../cidades/itau.js"></script>

<script>

let tipoSelecionado = "";
let cidadeValida = false;

/* =========================
CARREGAR TERMOS
========================= */
if(window.termosTexto){
  document.getElementById("termosBox").value = window.termosTexto;
}

/* =========================
CARREGAR CIDADES
========================= */

const cidades = [
  {nome: "Passos", status: "ativo"},
  {nome: "Alpinópolis", status: "indisponivel"},
  {nome: "Bom Jesus", status: "indisponivel"},
  {nome: "Glória", status: "indisponivel"},
  {nome: "Itaú", status: "indisponivel"}
];

const select = document.getElementById("cidadeSelect");

cidades.forEach(c => {
  const opt = document.createElement("option");
  opt.value = c.nome.toLowerCase();
  opt.textContent = c.nome;
  select.appendChild(opt);
});

/* =========================
TIPO
========================= */
function selecionarTipo(tipo){
  tipoSelecionado = tipo;
  validar();
}

/* =========================
CIDADE
========================= */
select.addEventListener("change", function(){

  const cidade = this.value;

  if(cidade === "passos"){
    cidadeValida = true;
  }else if(cidade){
    cidadeValida = false;
    alert("🚫 Serviço indisponível na sua cidade ainda");
  }

  validar();
});

/* =========================
BUSCA
========================= */
document.getElementById("cidadeBusca").addEventListener("input", function(){

  const busca = this.value.toLowerCase();

  for(let i = 0; i < select.options.length; i++){
    const opt = select.options[i];

    if(opt.value.includes(busca)){
      select.selectedIndex = i;
      break;
    }
  }

});

/* =========================
ACEITE
========================= */
document.getElementById("aceite").addEventListener("change", validar);

/* =========================
VALIDAÇÃO
========================= */
function validar(){

  const aceito = document.getElementById("aceite").checked;
  const btn = document.getElementById("continuar");

  if(tipoSelecionado && cidadeValida && aceito){
    btn.disabled = false;
    btn.style.opacity = "1";
  }else{
    btn.disabled = true;
    btn.style.opacity = "0.5";
  }
}

/* =========================
CONTINUAR
========================= */
document.getElementById("continuar").addEventListener("click", function(){

  if(tipoSelecionado === "cliente"){
    window.location.href = "cliente.html";
  }

  if(tipoSelecionado === "motorista"){
    window.location.href = "motorista.html";
  }

});

</script>

</body>
</html>
