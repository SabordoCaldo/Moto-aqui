<!DOCTYPE html>
<html lang="pt-BR">
<head>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">
  <div class="card">

    <h1>Você é cliente ou motorista?</h1>

    <button class="btn" onclick="selecionarTipo('cliente')">Sou Cliente</button>
    <button class="btn" onclick="selecionarTipo('motorista')">Sou Motorista</button>

    <select id="cidade" onchange="validar()">
      <option value="">Selecione sua cidade</option>
      <option>Alpinópolis</option>
      <option>Bom Jesus da Penha</option>
      <option>Cássia</option>
      <option>Fortaleza de Minas</option>
      <option>Furnas</option>
      <option>Itaú de Minas</option>
      <option>Passos</option>
      <option>Pratápolis</option>
      <option>São João Batista do Glória</option>
      <option>São José da Barra</option>
      <option>São Sebastião do Paraíso</option>
    </select>

    <input type="checkbox" id="termosCheck" onchange="validar()"> Aceito termos

    <button id="btnContinuar" class="btn" onclick="continuar()" disabled>
      Continuar
    </button>

  </div>
</div>

<script src="../js/escolha.js"></script>

</body>
</html>
