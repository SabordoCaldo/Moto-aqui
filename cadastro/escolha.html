<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">
  <div class="card">

    <h1>Como você quer usar?</h1>

    <label>
      <input type="radio" name="tipo" value="cliente"> Cliente
    </label>

    <label>
      <input type="radio" name="tipo" value="motorista"> Motorista
    </label>

    <label>Cidade</label>
    <select id="cidade" class="input-box">
      <option value="">Selecione</option>
      <option>Alpinópolis</option>
      <option>Bom Jesus da Penha</option>
      <option>Itaú de Minas</option>
      <option>Passos</option>
      <option>São João Batista do Glória</option>
    </select>

    <!-- TERMOS COM SCROLL -->
    <div id="boxTermos" style="
      height:150px;
      overflow-y:scroll;
      background:#f5f5f5;
      padding:10px;
      border-radius:10px;
      font-size:13px;
      margin-bottom:10px;
    "></div>

    <!-- CHECKBOX BLOQUEADO -->
    <label id="labelTermos" style="opacity:0.5;">
      <input type="checkbox" id="termos" disabled>
      Li e aceito os termos
    </label>

    <button class="btn" onclick="continuar()">Continuar</button>

  </div>
</div>

<script src="../termos/termos.js"></script>
<script src="../js/escolha.js"></script>

<script>

const box = document.getElementById("boxTermos");
const checkbox = document.getElementById("termos");
const label = document.getElementById("labelTermos");

// CARREGAR TERMOS
box.innerHTML = termosApp.texto;

// LIBERAR CHECKBOX AO CHEGAR NO FINAL
box.addEventListener("scroll", () => {

  if(box.scrollTop + box.clientHeight >= box.scrollHeight - 5){
    checkbox.disabled = false;
    label.style.opacity = "1";
  }

});

</script>

</body>
</html>
