<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">
  <div class="card">

    <h1>Como você quer usar?</h1>

    <label>
      <input type="radio" name="tipo" value="cliente"> Cliente
    </label>

    <label>
      <input type="radio" name="tipo" value="motorista"> Motorista
    </label>

    <!-- CIDADE -->
    <label>Cidade</label>

    <select id="cidade" class="input-box">
      <option value="">Selecione sua cidade</option>
      <option value="Passos">Passos</option>
      <option value="Alpinópolis">Alpinópolis</option>
      <option value="Bom Jesus da Penha">Bom Jesus da Penha</option>
      <option value="Itaú de Minas">Itaú de Minas</option>
      <option value="São João Batista do Glória">São João Batista do Glória</option>
    </select>

    <!-- TERMOS -->
    <div id="boxTermos" style="
      height:150px;
      overflow-y:scroll;
      background:#f5f5f5;
      padding:10px;
      border-radius:10px;
      font-size:13px;
      margin-bottom:10px;
    "></div>

    <label id="labelTermos" style="opacity:0.5;">
      <input type="checkbox" id="termos" disabled>
      Li e aceito os termos
    </label>

    <button class="btn" onclick="continuar()">Continuar</button>

  </div>
</div>

<script src="../termos/termos.js"></script>
<script src="../js/escolha.js"></script>

<script>

const box = document.getElementById("boxTermos");
const checkbox = document.getElementById("termos");
const label = document.getElementById("labelTermos");

// CARREGA TERMOS
box.innerHTML = termosApp.texto;

// BLOQUEIO INICIAL
checkbox.disabled = true;
label.style.opacity = "0.5";

// LIBERA AO FINAL
box.addEventListener("scroll", function(){

  const chegouFinal = box.scrollTop + box.clientHeight >= box.scrollHeight - 2;

  if(chegouFinal){
    checkbox.disabled = false;
    label.style.opacity = "1";
  }

});

</script>

</body>
</html>
