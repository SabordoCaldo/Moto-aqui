<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escolha</title>

<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="container">
<div class="card">

<!-- LOGO -->
<div style="text-align:center">
  <img src="../assets/logo.png" style="width:200px;">
  <p class="sub" style="color:#FFD600; font-size:20px;">
    App de mobilidade urbana
  </p>
</div>

<!-- TÍTULO -->
<h1 style="text-align:center;">ESCOLHA</h1>

<!-- BOTÕES -->
<button class="btn" 
style="font-size:19px; margin-bottom:15px;" 
onclick="selecionarTipo('cliente')">
  Sou Cliente
</button>

<button class="btn" 
style="font-size:19px; margin-bottom:20px;" 
onclick="selecionarTipo('motorista')">
  Sou Motorista
</button>

<!-- CIDADE -->
<label>Cidade</label>

<select id="cidadeSelect" 
style="width:100%; padding:12px; border-radius:10px; margin-bottom:15px;">
  <option value="">Selecione a cidade</option>
  <option value="passos">Passos</option>
  <option value="alpinopolis">Alpinópolis</option>
  <option value="bom-jesus">Bom Jesus</option>
  <option value="gloria">Glória</option>
  <option value="itau">Itaú</option>
</select>

<!-- TERMOS -->
<label>Termos e Privacidade</label>

<textarea id="termosBox"
style="width:100%; height:120px; border-radius:10px; padding:10px;"
readonly></textarea>

<!-- ACEITE -->
<label style="display:block; margin-top:20px; font-weight:bold;">
  <input type="checkbox" id="aceite">
  ESTOU CIENTE E ACEITO OS TERMOS
</label>

<!-- BOTÃO -->
<button class="btn" id="continuar"
disabled style="margin-top:25px; opacity:0.5;">
Continuar
</button>

<p style="text-align:center;margin-top:10px;">
<a href="../index.html">Voltar</a>
</p>

</div>
</div>

<!-- =========================
SCRIPTS
========================= -->

<script src="../termos/termos.js"></script>

<script>
let tipoSelecionado = "";
let cidadeValida = false;

/* TERMOS */
if(window.termosTexto){
  document.getElementById("termosBox").value = window.termosTexto;
}

/* TIPO */
function selecionarTipo(tipo){
  tipoSelecionado = tipo;
  validar();
}

/* CIDADE */
document.getElementById("cidadeSelect").addEventListener("change", function(){

  const cidade = this.value;

  if(cidade === "passos"){
    cidadeValida = true;
  }else if(cidade){
    cidadeValida = false;
    alert("🚫 Serviço indisponível na sua cidade ainda");
  }

  validar();
});

/* ACEITE */
document.getElementById("aceite").addEventListener("change", validar);

/* VALIDAR */
function validar(){
  const aceito = document.getElementById("aceite").checked;
  const btn = document.getElementById("continuar");

  if(tipoSelecionado && cidadeValida && aceito){
    btn.disabled = false;
    btn.style.opacity = "1";
  }else{
    btn.disabled = true;
    btn.style.opacity = "0.5";
  }
}

/* CONTINUAR */
document.getElementById("continuar").addEventListener("click", function(){

  if(tipoSelecionado === "cliente"){
    window.location.href = "cliente.html";
  }

  if(tipoSelecionado === "motorista"){
    window.location.href = "motorista.html";
  }

});
</script>

</body>
</html>
