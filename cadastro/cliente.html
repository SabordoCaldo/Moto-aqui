<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Cliente</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/cadastro.css">

</head>

<body>

<div class="container">
  <div class="card">

    <h1>Cadastro Cliente</h1>

    <!-- FOTO -->
    <div class="foto-perfil">
      <img id="fotoPreview" src="../assets/user-cliente.png">
      <div class="add">+</div>
      <input type="file" id="inputFoto">
    </div>

    <!-- NOME -->
    <label>Nome</label>
    <div class="input-box">
      <input type="text" id="nome" placeholder="Digite seu nome">
    </div>

    <!-- TELEFONE -->
    <label>Telefone</label>
    <div class="input-box">
      <input type="tel" id="telefone" placeholder="Digite seu telefone">
    </div>

    <!-- ENDEREÇO -->
    <label>Endereço</label>
    <div class="input-box">
      <input type="text" id="endereco" placeholder="Digite seu endereço">
    </div>

    <!-- SENHA -->
    <label>Senha</label>
    <div class="input-box">
      <input type="password" id="senha" placeholder="Senha (mín. 4 dígitos)">
      <span class="eye" onclick="toggleSenha('senha', this)">
        <svg viewBox="0 0 24 24">
          <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6-10-6-10-6z"/>
          <path d="M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
        </svg>
      </span>
    </div>

    <!-- CONFIRMAR -->
    <label>Confirmar Senha</label>
    <div class="input-box">
      <input type="password" id="confirmar" placeholder="Confirmar senha">
      <span class="eye" onclick="toggleSenha('confirmar', this)">
        <svg viewBox="0 0 24 24">
          <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6-10-6-10-6z"/>
          <path d="M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
        </svg>
      </span>
    </div>

    <!-- BOTÃO -->
    <button class="btn" onclick="cadastrar()">Cadastrar</button>

  </div>
</div>

<script src="../js/cliente.js"></script>

<script>

/* FOTO */
document.getElementById("inputFoto").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(event){
    document.getElementById("fotoPreview").src = event.target.result;
  };
  reader.readAsDataURL(file);
});

/* OLHO */
function toggleSenha(id, el){
  const input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
    el.classList.add("off");
  }else{
    input.type = "password";
    el.classList.remove("off");
  }
}

/* TELEFONE */
document.getElementById("telefone").addEventListener("input", function(e){

  let v = e.target.value.replace(/\D/g, "");

  if(v.length > 11) v = v.slice(0,11);

  if(v.length > 6){
    v = v.replace(/^(\d{2})(\d{5})(\d{0,4})$/, "($1) $2-$3");
  }else if(v.length > 2){
    v = v.replace(/^(\d{2})(\d{0,5})$/, "($1) $2");
  }else{
    v = v.replace(/^(\d*)$/, "($1");
  }

  e.target.value = v;

});

</script>

</body>
</html>
