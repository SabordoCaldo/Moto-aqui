<!DOCTYPE html>
<html lang="pt-BR">

<!-- =========================
HEAD
========================= -->
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Cliente</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<!-- =========================
BODY
========================= -->
<body>

<div class="container">
  <div class="card">

    <!-- =========================
    TÍTULO
    ========================= -->
    <h1>CADASTRO CLIENTE</h1>

    <!-- =========================
    FOTO PERFIL
    ========================= -->
    <div class="foto-perfil" onclick="escolherFoto()">

      <img id="fotoPreview" src="../assets/user-cliente.png">

      <div class="add">+</div>

      <input type="file" id="inputFoto" accept="image/*">

    </div>

    <!-- =========================
    NOME
    ========================= -->
    <label>Nome</label>
    <div class="input-box">
      <input type="text" id="nome" placeholder="Digite seu nome">
    </div>

    <!-- =========================
    TELEFONE
    ========================= -->
    <label>Telefone</label>
    <div class="input-box">
      <input type="tel" id="telefone" placeholder="Digite seu telefone">
    </div>

    <!-- =========================
    ENDEREÇO
    ========================= -->
    <label>Endereço</label>
    <div class="input-box">
      <input type="text" id="endereco" placeholder="Digite seu endereço">
    </div>

    <!-- =========================
    SENHA
    ========================= -->
    <label>Senha</label>
    <div class="input-box">
      <input type="password" id="senha" placeholder="Senha (mín. 4 dígitos)">
    </div>

    <!-- =========================
    CONFIRMAR SENHA
    ========================= -->
    <label>Confirmar Senha</label>
    <div class="input-box">
      <input type="password" id="confirmar" placeholder="Confirmar senha">
    </div>

    <!-- =========================
    BOTÃO
    ========================= -->
    <button class="btn" onclick="cadastrar()">Cadastrar</button>

    <!-- =========================
    VOLTAR
    ========================= -->
    <p style="text-align:center;">
      <a href="escolha.html">Voltar</a>
    </p>

  </div>
</div>

<!-- =========================
SCRIPTS
========================= -->
<script src="../js/cadastro.js"></script>

<script>

function escolherFoto(){
  document.getElementById("inputFoto").click();
}

// PREVIEW FOTO
document.getElementById("inputFoto").addEventListener("change", function(e){

  const file = e.target.files[0];

  if(file){
    const reader = new FileReader();

    reader.onload = function(event){
      document.getElementById("fotoPreview").src = event.target.result;
    };

    reader.readAsDataURL(file);
  }

});

</script>

</body>
</html>
