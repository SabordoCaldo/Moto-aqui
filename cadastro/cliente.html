<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Cliente</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">

  <div class="card">

    <h1>CADASTRO CLIENTE</h1>

    <div class="form">

      <!-- FOTO -->
      <div class="foto-perfil">
        <label for="foto">
          <img id="preview" src="../assets/user.png">
          <div class="add">+</div>
        </label>
        <input type="file" id="foto" accept="image/*">
      </div>

      <!-- NOME -->
      <label>Nome</label>
      <div class="input-box">
        <input type="text" id="nome" placeholder="Seu nome">
      </div>

      <!-- TELEFONE -->
      <label>Telefone</label>
      <div class="input-box">
        <input type="text" id="telefone" placeholder="Seu telefone">
      </div>

      <!-- ENDEREÇO -->
      <label>Endereço</label>
      <div class="input-box">
        <input type="text" id="endereco" placeholder="Seu endereço">
      </div>

      <!-- EMAIL -->
      <label>E-mail</label>
      <div class="input-box">
        <input type="email" id="email" placeholder="Seu e-mail">
      </div>

      <!-- SENHA -->
      <label>Senha</label>
      <div class="input-box">
        <input type="password" id="senha" placeholder="Senha">
      </div>

      <!-- CONFIRMAR -->
      <label>Confirmar Senha</label>
      <div class="input-box">
        <input type="password" id="confirmarSenha" placeholder="Confirmar senha">
      </div>

      <!-- BOTÃO -->
      <button class="btn" onclick="cadastrarCliente()">Cadastrar</button>

      <!-- VOLTAR -->
      <p class="cadastro">
        <a href="escolha.html">Voltar</a>
      </p>

    </div>

  </div>

</div>

<script src="../js/script.js"></script>

</body>
</html>
