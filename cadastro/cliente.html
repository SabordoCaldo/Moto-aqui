<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Cliente</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">
  <div class="card">

    <h1>CADASTRO CLIENTE</h1>

    <!-- FOTO PERFIL -->
    <div class="foto-perfil" onclick="escolherFoto()">

      <canvas id="canvasFoto"></canvas>

      <div class="add">+</div>

      <input type="file" id="inputFoto" accept="image/*">

    </div>

    <!-- NOME -->
    <label>Nome</label>
    <div class="input-box">
      <input type="text" id="nome" placeholder="Digite seu nome">
    </div>

    <!-- TELEFONE -->
    <label>Telefone</label>
    <div class="input-box">
      <input type="tel" id="telefone" placeholder="Digite seu telefone">
    </div>

    <!-- ENDEREÇO -->
    <label>Endereço</label>
    <div class="input-box">
      <input type="text" id="endereco" placeholder="Digite seu endereço">
    </div>

    <!-- 🔥 REMOVIDO EMAIL -->

    <!-- SENHA -->
    <label>Senha</label>
    <div class="input-box">
      <input type="password" id="senha" placeholder="Senha (mín. 4 dígitos)">
    </div>

    <!-- CONFIRMAR -->
    <label>Confirmar Senha</label>
    <div class="input-box">
      <input type="password" id="confirmar" placeholder="Confirmar senha">
    </div>

    <!-- BOTÃO -->
    <button class="btn" onclick="cadastrar()">Cadastrar</button>

    <p style="text-align:center;">
      <a href="escolha.html">Voltar</a>
    </p>

  </div>
</div>

<script src="../js/cadastro.js"></script>

<script>

// FOTO
function escolherFoto(){

  const escolha = confirm("OK = Câmera\nCancelar = Galeria");

  const input = document.getElementById("inputFoto");

  if(escolha){
    input.setAttribute("capture", "environment");
  }else{
    input.removeAttribute("capture");
  }

  input.click();
}

</script>

</body>
</html>
