<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Cliente</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">

  <div class="card">

    <h1>CADASTRO CLIENTE</h1>

    <div class="form">

      <!-- FOTO -->
      <div class="foto-perfil">
        <label for="foto">
          <img id="preview" src="../assets/user.png">
          <div class="add">+</div>
        </label>
        <input type="file" id="foto" accept="image/*">
      </div>

      <!-- NOME -->
      <label>Nome</label>
      <div class="input-box">
        <input type="text" id="nome">
      </div>

      <!-- TELEFONE -->
      <label>Telefone</label>
      <div class="input-box">
        <input type="text" id="telefone">
      </div>

      <!-- ENDEREÇO -->
      <label>Endereço</label>
      <div class="input-box">
        <input type="text" id="endereco">
      </div>

      <!-- EMAIL -->
      <label>E-mail</label>
      <div class="input-box">
        <input type="email" id="email">
      </div>

      <!-- SENHA -->
      <label>Senha</label>
      <div class="input-box">
        <input type="password" id="senha">

        <span onclick="toggleSenha('senha')" class="eye">
          <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 24 24">
            <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
          </svg>

          <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 24 24" style="display:none;">
            <path d="M12 5c-7 0-11 7-11 7a21.8 21.8 0 0 0 5.2 5.9l-2.1 2.1 1.4 1.4 16-16-1.4-1.4-2.5 2.5c-1.6-.8-3.5-1.5-5.6-1.5zm0 12c-1.7 0-3.3-.5-4.6-1.3l1.6-1.6A5 5 0 0 0 12 17c2.8 0 5-2.2 5-5 0-.7-.1-1.3-.4-1.9l1.7-1.7c1.6 1.4 2.7 3.6 2.7 3.6s-4 7-11 7z"/>
          </svg>
        </span>
      </div>

      <!-- CONFIRMAR -->
      <label>Confirmar Senha</label>
      <div class="input-box">
        <input type="password" id="confirmarSenha">

        <span onclick="toggleSenha('confirmarSenha')" class="eye">
          <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 24 24">
            <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
          </svg>

          <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 24 24" style="display:none;">
            <path d="M12 5c-7 0-11 7-11 7a21.8 21.8 0 0 0 5.2 5.9l-2.1 2.1 1.4 1.4 16-16-1.4-1.4-2.5 2.5c-1.6-.8-3.5-1.5-5.6-1.5zm0 12c-1.7 0-3.3-.5-4.6-1.3l1.6-1.6A5 5 0 0 0 12 17c2.8 0 5-2.2 5-5 0-.7-.1-1.3-.4-1.9l1.7-1.7c1.6 1.4 2.7 3.6 2.7 3.6s-4 7-11 7z"/>
          </svg>
        </span>
      </div>

      <button class="btn" onclick="cadastrarCliente()">Cadastrar</button>

      <p class="cadastro">
        <a href="escolha.html">Voltar</a>
      </p>

    </div>

  </div>

</div>

<script src="../js/script.js"></script>

</body>
</html>
