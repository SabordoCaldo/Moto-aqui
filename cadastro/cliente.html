<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Cliente</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">

  <div class="card">

    <!-- LOGO -->
    <div class="logo-box">
      <img src="../assets/logo.png">
    </div>

    <!-- TEXTO -->
    <p class="sub">App de mobilidade urbana</p>
    <h1>CADASTRO CLIENTE</h1>

    <!-- FORM -->
    <div class="form">

      <!-- NOME -->
      <label>Nome</label>
      <div class="input-box">
        <input type="text" id="nome" placeholder="Seu nome">
      </div>

      <!-- EMAIL -->
      <label>Email</label>
      <div class="input-box">
        <input type="email" id="email" placeholder="Seu e-mail">
      </div>

      <!-- SENHA -->
      <label>Senha</label>
      <div class="input-box">
        <input type="password" id="senha" placeholder="Senha">
      </div>

      <!-- BOTÃO -->
      <button class="btn" onclick="cadastrarCliente()">Cadastrar</button>

      <!-- VOLTAR -->
      <p class="cadastro">
        <a href="escolha.html">Voltar</a>
      </p>

    </div>

  </div>

</div>

<script src="../js/script.js"></script>

</body>
</html>
