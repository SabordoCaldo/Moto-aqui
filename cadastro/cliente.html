<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Cliente</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">
  <div class="card">

    <h1>CADASTRO CLIENTE</h1>

    <!-- FOTO -->
    <div class="foto-perfil" onclick="escolherFoto()">
      <img id="fotoPreview" src="../assets/user-cliente.png">
      <div class="add">+</div>
      <input type="file" id="inputFoto" accept="image/*">
    </div>

    <!-- NOME -->
    <label>Nome</label>
    <div class="input-box">
      <input type="text" id="nome">
    </div>

    <!-- TELEFONE -->
    <label>Telefone</label>
    <div class="input-box">
      <input type="tel" id="telefone">
    </div>

    <!-- ENDEREÇO -->
    <label>Endereço</label>
    <div class="input-box">
      <input type="text" id="endereco">
    </div>

    <!-- SENHA -->
    <label>Senha</label>
    <div class="input-box">
      <input type="password" id="senha">
      <span class="eye" onclick="toggleSenha('senha', this)">
        <svg viewBox="0 0 24 24">
          <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6-10-6-10-6z"/>
          <path d="M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
        </svg>
      </span>
    </div>

    <!-- CONFIRMAR -->
    <label>Confirmar Senha</label>
    <div class="input-box">
      <input type="password" id="confirmar">
      <span class="eye" onclick="toggleSenha('confirmar', this)">
        <svg viewBox="0 0 24 24">
          <path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6-10-6-10-6z"/>
          <path d="M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
        </svg>
      </span>
    </div>

    <button class="btn" onclick="cadastrar()">Cadastrar</button>

    <p style="text-align:center;">
      <a href="escolha.html">Voltar</a>
    </p>

  </div>
</div>

<script src="../js/cliente.js"></script>

<script>

// FOTO
function escolherFoto(){
  document.getElementById("inputFoto").click();
}

document.getElementById("inputFoto").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(event){
      document.getElementById("fotoPreview").src = event.target.result;
    };
    reader.readAsDataURL(file);
  }
});

// OLHO
function toggleSenha(id, el){
  const input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
    el.classList.add("off");
  }else{
    input.type = "password";
    el.classList.remove("off");
  }
}

// TELEFONE
document.getElementById("telefone").addEventListener("input", function(e){
  let v = e.target.value.replace(/\D/g, "");
  if(v.length > 11) v = v.slice(0,11);

  if(v.length > 6){
    v = v.replace(/^(\d{2})(\d{5})(\d{0,4})$/, "($1) $2-$3");
  }else if(v.length > 2){
    v = v.replace(/^(\d{2})(\d{0,5})$/, "($1) $2");
  }else{
    v = v.replace(/^(\d*)$/, "($1");
  }

  e.target.value = v;
});

</script>

</body>
</html>
